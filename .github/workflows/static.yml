name: Deploy Horror Player

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Updated to v4 to comply with deprecation notice
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # Updated to v3 to match current stable versioning
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
